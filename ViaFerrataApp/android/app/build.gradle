apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// Disable RNGP tasks that call react-native config (fails on Windows — packageName not resolved)
gradle.projectsEvaluated {
    tasks.configureEach { task ->
        if (task.name.contains("generateAutolinkingPackageList") ||
            task.name.contains("generateReactNativeEntryPoint")) {
            task.enabled = false
        }
    }
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    // root = file("../")
    // reactNativeDir = file("../node_modules/react-native")
    // codegenDir = file("../node_modules/@react-native/codegen")
    // cliFile = file("../node_modules/react-native/cli.js")

    /* Bundling */
    // bundleInDebug = false
    // bundleInRelease = true
    // jsRootDir = file("../src")

    /* Bundle name */
    // bundleAssetName = "MetroBundle"

    /* Packager */
    // enableHermes = true
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = true

/**
 * Keystore configuration — reads from gradle.properties (or -P flags passed by build.sh)
 */
def keystorePropertiesFile = rootProject.file("../keystore/keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

// Allow override via command-line -P flags (used by build.sh)
def ksPath          = project.hasProperty('KEYSTORE_PATH')           ? project.KEYSTORE_PATH           : (keystoreProperties['storeFile'] ? "../keystore/${keystoreProperties['storeFile']}" : "../../keystore/viaferrata.keystore")
def ksStorePassword = project.hasProperty('KEYSTORE_STORE_PASSWORD') ? project.KEYSTORE_STORE_PASSWORD : (keystoreProperties['storePassword'] ?: "")
def ksKeyAlias      = project.hasProperty('KEYSTORE_KEY_ALIAS')      ? project.KEYSTORE_KEY_ALIAS      : (keystoreProperties['keyAlias'] ?: "")
def ksKeyPassword   = project.hasProperty('KEYSTORE_KEY_PASSWORD')   ? project.KEYSTORE_KEY_PASSWORD   : (keystoreProperties['keyPassword'] ?: "")

android {
    ndkVersion rootProject.ext.ndkVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.viaferrataapp"

    defaultConfig {
        applicationId "com.viaferrataapp"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            storeFile file(ksPath)
            storePassword ksStorePassword
            keyAlias ksKeyAlias
            keyPassword ksKeyPassword
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
}
